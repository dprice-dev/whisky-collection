<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisky Collection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff; --bg2: #f6f5f0; --bg3: #eeecea;
      --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius: 10px; --radius-sm: 6px;
      --amber-bg:#faeeda; --amber-text:#633806;
      --green-bg:#eaf3de; --green-text:#27500a;
      --blue-bg:#e6f1fb;  --blue-text:#0c447c;
      --gray-bg:#f1efe8;  --gray-text:#444441;
      --red-text:#a32d2d;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#1c1c1a; --bg2:#252523; --bg3:#2e2e2b;
        --text:#f0ede6; --text2:#a8a8a0; --text3:#686860;
        --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
        --amber-bg:#412402; --amber-text:#FAC775;
        --green-bg:#173404; --green-text:#C0DD97;
        --blue-bg:#042C53;  --blue-text:#B5D4F4;
        --gray-bg:#2C2C2A;  --gray-text:#D3D1C7;
        --red-text:#F09595;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg3); color: var(--text);
      min-height: 100vh; font-size: 15px; line-height: 1.5;
    }

    header {
      background: var(--bg); border-bottom: 0.5px solid var(--border);
      padding: 0 1.25rem; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }

    header h1 { font-size: 16px; font-weight: 500; }

    .sync-row { display: flex; align-items: center; gap: 8px; }
    #sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #888; flex-shrink: 0; transition: background 0.3s; }
    #sync-label { font-size: 12px; color: var(--text3); }

    main { max-width: 680px; margin: 0 auto; padding: 1.25rem; }

    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.25rem; }
    .stat { background: var(--bg); border-radius: var(--radius-sm); padding: 0.75rem 1rem; }
    .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
    .stat-val { font-size: 22px; font-weight: 500; }

    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }

    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

    @media (max-width: 520px) {
      .g2, .g3 { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2,1fr); }
      .bottle-actions { flex-direction: column; }
    }

    input[type=text], input[type=password], select, textarea {
      width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
      padding: 8px 10px; font-size: 13px; color: var(--text); background: var(--bg);
      font-family: inherit; appearance: none;
    }
    select { height: 36px; }
    textarea { resize: vertical; min-height: 64px; }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55,138,221,0.15);
    }

    .form-footer { display: flex; justify-content: flex-end; margin-top: 10px; gap: 8px; }

    button {
      font-family: inherit; cursor: pointer; background: transparent;
      border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
      padding: 7px 16px; font-size: 13px; color: var(--text); transition: background 0.15s;
    }
    button:hover { background: var(--bg2); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: default; transform: none; }
    button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    button.primary:hover { opacity: 0.85; }
    button.danger { color: var(--red-text); }

    .filters { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .filters select { width: auto; min-width: 150px; }
    .count { font-size: 12px; color: var(--text3); margin-left: auto; }

    .bottle { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
    .bottle-top { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
    .bottle-info { flex: 1; min-width: 0; }
    .bottle-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
    .bottle-name { font-size: 14px; font-weight: 500; }
    .bottle-meta { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .bottle-notes { font-size: 12px; color: var(--text2); font-style: italic; }
    .bottle-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .bottle-actions select { width: auto; min-width: 130px; font-size: 12px; height: 30px; padding: 4px 8px; }
    .bottle-actions button { padding: 4px 10px; font-size: 12px; }

    .badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
    .badge-shelf    { background: var(--blue-bg);  color: var(--blue-text);  }
    .badge-drinking { background: var(--green-bg); color: var(--green-text); }
    .badge-to-try   { background: var(--amber-bg); color: var(--amber-text); }
    .badge-finished { background: var(--gray-bg);  color: var(--gray-text);  }
    .ppm-tag { font-size: 10px; color: var(--text3); }

    .setup-overlay {
      position: fixed; inset: 0; background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      padding: 1.25rem; z-index: 100;
    }

    .setup-box {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 480px;
    }

    .setup-box h2 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    .setup-box p { font-size: 13px; color: var(--text2); margin-bottom: 1rem; line-height: 1.6; }
    .setup-box label { font-size: 12px; color: var(--text3); display: block; margin-bottom: 4px; margin-top: 12px; }
    .setup-box a { color: #378ADD; }
    .error-msg { font-size: 12px; color: var(--red-text); margin-top: 8px; min-height: 16px; }

    .empty { font-size: 13px; color: var(--text3); text-align: center; padding: 2.5rem 0; }

    .rating { display: flex; gap: 3px; align-items: center; }
    .star { font-size: 14px; cursor: pointer; color: var(--text3); user-select: none; }
    .star.on { color: #BA7517; }
  </style>
</head>
<body>

<!-- Setup overlay (shown on first run) -->
<div class="setup-overlay" id="setup-overlay">
  <div class="setup-box">
    <h2>Set up your whisky tracker</h2>
    <p>Your collection is stored in a JSON file in your GitHub repository. Enter your details below — they're saved only in this browser.</p>

    <label>GitHub username</label>
    <input type="text" id="setup-user" placeholder="e.g. davidsmith" />

    <label>Repository name</label>
    <input type="text" id="setup-repo" placeholder="e.g. whisky-collection" />

    <label>
      Personal Access Token
      (<a href="https://github.com/settings/tokens/new?scopes=repo&description=Whisky+Tracker" target="_blank">generate one here</a> — needs <code>repo</code> scope)
    </label>
    <input type="password" id="setup-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />

    <div class="error-msg" id="setup-error"></div>
    <div class="form-footer">
      <button class="primary" id="setup-save">Connect to GitHub</button>
    </div>
  </div>
</div>

<header>
  <h1>Whisky Collection</h1>
  <div class="sync-row">
    <div id="sync-dot"></div>
    <span id="sync-label">Loading...</span>
    <button id="btn-save" disabled style="margin-left:4px;">Save</button>
    <button id="btn-settings" style="margin-left:4px;" title="Settings">&#9881;</button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <!-- Add bottle form -->
  <div class="card">
    <div class="card-title">Add a bottle</div>
    <div class="g2">
      <input type="text" id="f-name" placeholder="Name (e.g. Lagavulin 16)" />
      <input type="text" id="f-distillery" placeholder="Distillery / producer" />
    </div>
    <div class="g3">
      <select id="f-type">
        <option value="">Type</option>
        <option>Single malt Scotch</option>
        <option>Blended Scotch</option>
        <option>Bourbon</option>
        <option>Rye</option>
        <option>Irish</option>
        <option>Japanese</option>
        <option>Other</option>
      </select>
      <select id="f-status">
        <option value="shelf">Shelf — keep sealed</option>
        <option value="drinking">Open — drinking</option>
        <option value="to-try">To try</option>
        <option value="finished">Finished</option>
      </select>
      <input type="text" id="f-ppm" placeholder="PPM (if peated)" />
    </div>
    <textarea id="f-notes" placeholder="Notes — occasion, who gave it, tasting impressions..."></textarea>
    <div class="form-footer">
      <button class="primary" id="btn-add">Add to collection</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <select id="filter-status">
      <option value="all">All bottles</option>
      <option value="shelf">Shelf only</option>
      <option value="drinking">Open / drinking</option>
      <option value="to-try">To try</option>
      <option value="finished">Finished</option>
    </select>
    <select id="filter-type">
      <option value="all">All types</option>
      <option>Single malt Scotch</option>
      <option>Blended Scotch</option>
      <option>Bourbon</option>
      <option>Rye</option>
      <option>Irish</option>
      <option>Japanese</option>
      <option>Other</option>
    </select>
    <span class="count" id="count-label"></span>
  </div>

  <!-- Bottle list -->
  <div id="bottle-list"></div>
</main>

<script>
  const STATUS_META = {
    'shelf':    { label: 'Shelf — sealed',  cls: 'badge-shelf'    },
    'drinking': { label: 'Open — drinking', cls: 'badge-drinking' },
    'to-try':   { label: 'To try',          cls: 'badge-to-try'   },
    'finished': { label: 'Finished',        cls: 'badge-finished' },
  };

  const DATA_FILE = 'collection.json';

  let cfg = {};
  let collection = [];
  let nextId = 1;
  let sha = null;
  let dirty = false;

  function loadCfg() {
    try { cfg = JSON.parse(localStorage.getItem('whisky-cfg') || '{}'); } catch(e) { cfg = {}; }
  }

  function saveCfg() {
    localStorage.setItem('whisky-cfg', JSON.stringify(cfg));
  }

  function isConfigured() {
    return cfg.user && cfg.repo && cfg.token;
  }

  function apiUrl() {
    return `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${DATA_FILE}`;
  }

  function apiHeaders() {
    return {
      'Authorization': `token ${cfg.token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    };
  }

  function setSyncState(state, msg) {
    const dot = document.getElementById('sync-dot');
    const lbl = document.getElementById('sync-label');
    const btn = document.getElementById('btn-save');
    const colors = { ok:'#1D9E75', saving:'#BA7517', error:'#A32D2D', loading:'#888', dirty:'#BA7517' };
    dot.style.background = colors[state] || '#888';
    lbl.textContent = msg;
    btn.disabled = (state !== 'dirty');
  }

  async function loadFromGitHub() {
    setSyncState('loading', 'Loading...');
    try {
      const res = await fetch(apiUrl(), { headers: apiHeaders() });
      if (res.status === 404) {
        // File doesn't exist yet — start fresh
        collection = [];
        nextId = 1;
        sha = null;
        setSyncState('ok', 'Ready — no data yet');
        render();
        return;
      }
      if (!res.ok) throw new Error(`GitHub error: ${res.status}`);
      const json = await res.json();
      sha = json.sha;
      const decoded = JSON.parse(atob(json.content.replace(/\n/g,'')));
      collection = decoded.collection || [];
      nextId = decoded.nextId || (collection.length + 1);
      setSyncState('ok', 'Loaded from GitHub');
      render();
    } catch(e) {
      setSyncState('error', 'Load failed');
      console.error(e);
    }
  }

  async function saveToGitHub() {
    setSyncState('saving', 'Saving...');
    document.getElementById('btn-save').disabled = true;
    const payload = JSON.stringify({ collection, nextId }, null, 2);
    const body = {
      message: `Update collection — ${new Date().toLocaleString()}`,
      content: btoa(unescape(encodeURIComponent(payload))),
    };
    if (sha) body.sha = sha;
    try {
      const res = await fetch(apiUrl(), { method: 'PUT', headers: apiHeaders(), body: JSON.stringify(body) });
      if (!res.ok) throw new Error(`GitHub error: ${res.status}`);
      const json = await res.json();
      sha = json.content.sha;
      dirty = false;
      setSyncState('ok', 'Saved to GitHub');
    } catch(e) {
      setSyncState('error', 'Save failed — try again');
      document.getElementById('btn-save').disabled = false;
      console.error(e);
    }
  }

  function markDirty() {
    dirty = true;
    setSyncState('dirty', 'Unsaved changes');
  }

  function render() {
    const fs = document.getElementById('filter-status').value;
    const ft = document.getElementById('filter-type').value;
    const filtered = collection.filter(b =>
      (fs === 'all' || b.status === fs) &&
      (ft === 'all' || b.type === ft)
    );

    document.getElementById('count-label').textContent =
      `${filtered.length} of ${collection.length} bottle${collection.length !== 1 ? 's' : ''}`;

    const counts = { shelf:0, drinking:0, 'to-try':0, finished:0 };
    collection.forEach(b => { if (counts[b.status] !== undefined) counts[b.status]++; });
    document.getElementById('stats').innerHTML = [
      ['Total', collection.length],
      ['On shelf', counts.shelf],
      ['Open', counts.drinking],
      ['To try', counts['to-try']],
    ].map(([label, val]) => `
      <div class="stat">
        <div class="stat-label">${label}</div>
        <div class="stat-val">${val}</div>
      </div>`).join('');

    const list = document.getElementById('bottle-list');
    if (!filtered.length) {
      list.innerHTML = `<div class="empty">No bottles match this filter.</div>`;
      return;
    }

    list.innerHTML = filtered.map(b => {
      const sm = STATUS_META[b.status] || STATUS_META['to-try'];
      const stars = [1,2,3,4,5].map(i =>
        `<span class="star ${(b.rating||0)>=i?'on':''}" onclick="setRating(${b.id},${i})">&#9733;</span>`
      ).join('');
      return `
        <div class="bottle">
          <div class="bottle-top">
            <div class="bottle-info">
              <div class="bottle-name-row">
                <span class="bottle-name">${b.name}</span>
                <span class="badge ${sm.cls}">${sm.label}</span>
                ${b.ppm ? `<span class="ppm-tag">${b.ppm} ppm</span>` : ''}
              </div>
              <div class="bottle-meta">${[b.distillery, b.type].filter(Boolean).join(' · ')}</div>
              <div class="rating">${stars}</div>
              ${b.notes ? `<div class="bottle-notes" style="margin-top:5px;">${b.notes}</div>` : ''}
            </div>
            <div class="bottle-actions">
              <select onchange="changeStatus(${b.id},this.value)">
                ${Object.entries(STATUS_META).map(([k,v])=>`<option value="${k}" ${b.status===k?'selected':''}>${v.label}</option>`).join('')}
              </select>
              <button class="danger" onclick="remove(${b.id})">Remove</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function changeStatus(id, val) {
    const b = collection.find(x => x.id === id);
    if (b) { b.status = val; markDirty(); render(); }
  }

  function setRating(id, val) {
    const b = collection.find(x => x.id === id);
    if (b) {
      b.rating = (b.rating === val) ? 0 : val;
      markDirty(); render();
    }
  }

  function remove(id) {
    if (!confirm('Remove this bottle from your collection?')) return;
    collection = collection.filter(x => x.id !== id);
    markDirty(); render();
  }

  document.getElementById('btn-add').onclick = () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { document.getElementById('f-name').focus(); return; }
    collection.unshift({
      id: nextId++,
      name,
      distillery: document.getElementById('f-distillery').value.trim(),
      type: document.getElementById('f-type').value,
      status: document.getElementById('f-status').value || 'shelf',
      ppm: document.getElementById('f-ppm').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
      rating: 0,
      added: new Date().toISOString().split('T')[0],
    });
    ['f-name','f-distillery','f-ppm','f-notes'].forEach(id => document.getElementById(id).value='');
    document.getElementById('f-type').value='';
    document.getElementById('f-status').value='shelf';
    markDirty(); render();
  };

  document.getElementById('btn-save').onclick = saveToGitHub;
  document.getElementById('filter-status').onchange = render;
  document.getElementById('filter-type').onchange = render;

  document.getElementById('btn-settings').onclick = () => {
    document.getElementById('setup-user').value = cfg.user || '';
    document.getElementById('setup-repo').value = cfg.repo || '';
    document.getElementById('setup-token').value = cfg.token || '';
    document.getElementById('setup-overlay').style.display = 'flex';
  };

  document.getElementById('setup-save').onclick = async () => {
    const user  = document.getElementById('setup-user').value.trim();
    const repo  = document.getElementById('setup-repo').value.trim();
    const token = document.getElementById('setup-token').value.trim();
    const err   = document.getElementById('setup-error');

    if (!user || !repo || !token) { err.textContent = 'All fields are required.'; return; }

    err.textContent = 'Checking...';
    document.getElementById('setup-save').disabled = true;

    try {
      const res = await fetch(`https://api.github.com/repos/${user}/${repo}`, {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (res.status === 401) throw new Error('Invalid token — check it was copied correctly.');
      if (res.status === 404) throw new Error('Repo not found — check username and repo name.');
      if (!res.ok) throw new Error(`GitHub error: ${res.status}`);

      cfg = { user, repo, token };
      saveCfg();
      document.getElementById('setup-overlay').style.display = 'none';
      err.textContent = '';
      loadFromGitHub();
    } catch(e) {
      err.textContent = e.message;
    } finally {
      document.getElementById('setup-save').disabled = false;
    }
  };

  // Init
  loadCfg();
  if (isConfigured()) {
    document.getElementById('setup-overlay').style.display = 'none';
    document.getElementById('setup-user').value = cfg.user;
    document.getElementById('setup-repo').value = cfg.repo;
    document.getElementById('setup-token').value = cfg.token;
    loadFromGitHub();
  } else {
    document.getElementById('setup-overlay').style.display = 'flex';
    setSyncState('loading', 'Not connected');
  }
</script>
</body>
</html>
